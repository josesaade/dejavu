<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a1916">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Déjà Vu">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<title>Déjà Vu</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@300;400&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f5f4f0;--bg2:#eceae4;--bg3:#e2e0d8;--surface:#fff;
  --text:#1a1916;--text2:#6b6960;--text3:#a8a69e;
  --border:rgba(26,25,22,0.1);--border2:rgba(26,25,22,0.18);
  --r:16px;--r-sm:10px;--r-pill:99px;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#141412;--bg2:#1e1d1a;--bg3:#262521;--surface:#1e1d1a;
  --text:#f0ede6;--text2:#8a8880;--text3:#555350;
  --border:rgba(240,237,230,0.08);--border2:rgba(240,237,230,0.15);
}}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:16px;line-height:1.5;}
.app{max-width:480px;margin:0 auto;padding-bottom:40px;}
.status-bar{height:calc(var(--safe-top)+6px);}
.header{padding:2px 20px 0;display:flex;align-items:center;justify-content:space-between;}
.header-title{font-size:12px;color:var(--text3);letter-spacing:0.14em;text-transform:uppercase;}
.back-btn{width:36px;height:36px;border-radius:var(--r-sm);border:1px solid var(--border2);background:var(--surface);color:var(--text);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;text-decoration:none;}

/* MAIN TABS */
.main-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 20px;margin-bottom:0;overflow-x:auto;scrollbar-width:none;}
.main-tabs::-webkit-scrollbar{display:none;}
.main-tab{padding:12px 16px;border:none;background:none;color:var(--text3);font-family:var(--font);font-size:13px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;}
.main-tab.active{color:var(--text);border-bottom-color:var(--text);}

/* SUB TABS */
.sub-tabs-wrap{padding:10px 20px 0;border-bottom:1px solid var(--border);}
.sub-tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:10px;}
.sub-tabs::-webkit-scrollbar{display:none;}
.sub-tab{padding:6px 13px;border-radius:var(--r-pill);border:1px solid var(--border2);background:none;color:var(--text2);font-family:var(--font);font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.sub-tab.active{background:var(--text);color:var(--bg);border-color:var(--text);}

/* PANELS */
.main-panel{display:none;}.main-panel.active{display:block;}
.sub-panel{display:none;}.sub-panel.active{display:block;}

/* CLOSET */
.closet-body{padding:16px 20px;}
.subtipo-lbl{font-size:10px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin:14px 0 8px;}
.subtipo-lbl:first-child{margin-top:0;}
.prenda-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 14px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start;}
.prenda-color{width:36px;height:36px;border-radius:8px;flex-shrink:0;border:1px solid var(--border);}
.prenda-info{flex:1;min-width:0;}
.prenda-top{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;margin-bottom:3px;}
.prenda-marca{font-size:14px;font-weight:500;color:var(--text);}
.prenda-usos{font-size:11px;color:var(--text3);}
.prenda-desc{font-size:12px;color:var(--text2);line-height:1.4;margin-bottom:7px;}
.prenda-outfits{display:flex;gap:4px;flex-wrap:wrap;}
.outfit-tag{font-size:10px;padding:2px 8px;border-radius:var(--r-pill);background:var(--bg2);color:var(--text2);border:1px solid var(--border2);}
.add-btn{width:100%;padding:11px;border-radius:var(--r-sm);border:1px dashed var(--border2);background:none;color:var(--text3);font-family:var(--font);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:4px;}
.add-btn:active{background:var(--bg2);}

/* FORM */
.form-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;display:flex;align-items:flex-end;}
.form-sheet{background:var(--bg);border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:90vh;overflow-y:auto;}
.form-title{font-size:17px;font-weight:400;margin-bottom:16px;}
.form-field{margin-bottom:12px;}
.form-field label{display:block;font-size:11px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:5px;}
.form-field input,.form-field select,.form-field textarea{width:100%;padding:10px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-family:var(--font);font-size:14px;outline:none;appearance:none;-webkit-appearance:none;}
.form-field textarea{resize:none;height:70px;}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:var(--border2);}
.form-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px;}
.btn{padding:13px 0;border-radius:var(--r-sm);border:1px solid var(--border2);font-family:var(--font);font-size:14px;cursor:pointer;background:none;color:var(--text);display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-dark{background:var(--text);color:var(--bg);border-color:var(--text);}

/* STATS */
.stats-body{padding:16px 20px;}
.sl{font-size:11px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin:18px 0 10px;}
.sl:first-child{margin-top:0;}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:4px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 13px;}
.kpi-val{font-size:28px;font-weight:300;letter-spacing:-0.02em;line-height:1;}
.kpi-lbl{font-size:10px;color:var(--text3);margin-top:3px;line-height:1.3;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:4px 14px;margin-bottom:10px;}
.row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.row:last-child{border-bottom:none;}
.rk{font-size:11px;color:var(--text3);font-family:var(--mono);min-width:18px;}
.rn{font-size:13px;color:var(--text);flex:1;min-width:0;}
.bw{width:70px;height:4px;background:var(--bg3);border-radius:99px;overflow:hidden;flex-shrink:0;}
.bf{height:100%;border-radius:99px;}
.rc{font-size:13px;font-family:var(--mono);color:var(--text2);min-width:22px;text-align:right;}
.os-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.os-id{font-size:11px;font-family:var(--mono);color:var(--text3);min-width:40px;}
.os-name{font-size:12px;color:var(--text);flex:1;}
.os-n{font-size:13px;font-weight:300;font-family:var(--mono);min-width:24px;text-align:right;}
.racha-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:14px;margin-bottom:8px;}
.racha-num{font-size:40px;font-weight:300;line-height:1;}
.racha-lbl{font-size:13px;color:var(--text);}
.racha-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.dow-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center;}
.dow-col{display:flex;flex-direction:column;align-items:center;gap:3px;}
.dow-lbl{font-size:9px;color:var(--text3);}
.dow-bw{width:100%;background:var(--bg2);border-radius:4px;height:56px;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden;}
.dow-bf{width:100%;border-radius:4px 4px 0 0;}
.dow-n{font-size:9px;font-family:var(--mono);color:var(--text3);}
.enf-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* HEATMAP */
.hm-body{padding:16px 20px;}
.hm-mes{margin-bottom:14px;}
.hm-mes-lbl{font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:5px;}
.hm-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.hm-cell{aspect-ratio:1;border-radius:3px;position:relative;overflow:hidden;}
.hm-empty{aspect-ratio:1;}
.hm-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.hm-leg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text3);}
.hm-leg-sq{width:10px;height:10px;border-radius:2px;flex-shrink:0;}

.loading{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px;}
.loading i{font-size:28px;display:block;margin-bottom:8px;opacity:0.4;}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:var(--r-pill);font-size:13px;white-space:nowrap;opacity:0;pointer-events:none;transition:all 0.22s;z-index:200;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="app">
  <div class="status-bar"></div>
  <div class="header">
    <a href="/" class="back-btn"><i class="ti ti-arrow-left"></i></a>
    <span class="header-title">déjà vu</span>
    <div style="width:36px;"></div>
  </div>

  <div class="main-tabs">
    <button class="main-tab active" data-main="closet">closet</button>
    <button class="main-tab" data-main="stats">estadísticas</button>
    <button class="main-tab" data-main="heatmap">heatmap</button>
  </div>

  <div class="loading" id="loading"><i class="ti ti-shirt"></i>cargando datos…</div>
  <div id="content" style="display:none;">

    <!-- ══════════════════════════════════ -->
    <!-- CLOSET                             -->
    <!-- ══════════════════════════════════ -->
    <div class="main-panel active" id="main-closet">
      <div class="sub-tabs-wrap">
        <div class="sub-tabs">
          <button class="sub-tab active" data-sub="pantalon">Pantalón</button>
          <button class="sub-tab" data-sub="camisa">Camisa</button>
          <button class="sub-tab" data-sub="calzado">Calzado</button>
          <button class="sub-tab" data-sub="bolso">Bolso de mano</button>
          <button class="sub-tab" data-sub="accesorio">Accesorios</button>
        </div>
      </div>
      <div class="sub-panel active" id="sub-pantalon"><div class="closet-body" id="list-pantalon"></div></div>
      <div class="sub-panel" id="sub-camisa"><div class="closet-body" id="list-camisa"></div></div>
      <div class="sub-panel" id="sub-calzado"><div class="closet-body" id="list-calzado"></div></div>
      <div class="sub-panel" id="sub-bolso"><div class="closet-body" id="list-bolso"></div></div>
      <div class="sub-panel" id="sub-accesorio"><div class="closet-body" id="list-accesorio"></div></div>
    </div>

    <!-- ══════════════════════════════════ -->
    <!-- ESTADÍSTICAS                       -->
    <!-- ══════════════════════════════════ -->
    <div class="main-panel" id="main-stats">
      <div class="stats-body">
        <div class="sl">resumen</div>
        <div class="kpi-grid" id="kpis-stats"></div>

        <div class="sl">rachas</div>
        <div id="rachas-section"></div>

        <div class="sl">outfits más usados</div>
        <div class="card" id="top-outfits"></div>

        <div class="sl">outfits nunca usados</div>
        <div class="card" id="nunca-usados"></div>

        <div class="sl">actividad por día de la semana</div>
        <div class="card" style="padding:14px;">
          <div class="dow-grid" id="dow-grid"></div>
        </div>

        <div class="sl">enfoques de esta semana</div>
        <div class="card" id="semana-enfoques"></div>
      </div>
    </div>

    <!-- ══════════════════════════════════ -->
    <!-- HEATMAP                            -->
    <!-- ══════════════════════════════════ -->
    <div class="main-panel" id="main-heatmap">
      <div class="hm-body">
        <div id="heatmap-wrap"></div>
        <div class="hm-legend" id="hm-legend"></div>
      </div>
    </div>

  </div>
</div>

<!-- FORM OVERLAY -->
<div class="form-overlay" id="form-overlay" style="display:none;">
  <div class="form-sheet">
    <div class="form-title" id="form-title">agregar prenda</div>
    <div class="form-field">
      <label>tipo</label>
      <select id="f-tipo">
        <option value="pantalon">Pantalón</option>
        <option value="camisa">Camisa</option>
        <option value="calzado">Calzado</option>
        <option value="bolso">Bolso de mano</option>
        <option value="accesorio">Accesorio</option>
      </select>
    </div>
    <div class="form-field">
      <label>subtipo</label>
      <input type="text" id="f-subtipo" placeholder="jean, chino, oxford, polo, tenis…">
    </div>
    <div class="form-field">
      <label>marca</label>
      <input type="text" id="f-marca" placeholder="H&M, Mevak, Adidas…">
    </div>
    <div class="form-field">
      <label>outfit(s) asociado(s)</label>
      <input type="text" id="f-outfits" placeholder="FF01, FF03, EE07…">
    </div>
    <div class="form-field">
      <label>color principal (hex)</label>
      <input type="text" id="f-color" placeholder="#1a1916">
    </div>
    <div class="form-field">
      <label>descripción</label>
      <textarea id="f-desc" placeholder="Jean negro slim fit, tiro medio…"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn" onclick="closeForm()">cancelar</button>
      <button class="btn btn-dark" onclick="guardarPrenda()"><i class="ti ti-check"></i> guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB_URL='https://uytbnqvmgalycxqnhdzb.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5dGJucXZtZ2FseWN4cW5oZHpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MjI0MzcsImV4cCI6MjA5NjQ5ODQzN30._6AtcAcpMqlhMAcU5rSP-UAq77k7n6hrhN2NgE49izY';
const SB_H={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};

const ENFOQUES_C={"Silver Chariot":"#9E9E9E","Lost in Paradise":"#C4A882","Stone Ocean":"#4A90C4","Emerald Splash":"#639922","Red Bebop":"#8B1A1A","Overtime":"#1E3A8A","Kurozaki Boy":"#E07B2A","Bites The Dust":"#E8A0B4","Black & White":"#555555","Golden Spin":"#8B6914","Jet Black":"#333333","Hermit Purple":"#9B59B6"};

const OUTFITS_INV=["EE01","EE02","EE03","EE04","EE05","EE06","EE07","EE08","FF01","FF02","FF03","FF04","FF05","FF06","FF07","FF08","FF09","FF10","FF11","FF12","FF13","FF14","FF15","FF16","FF17","FF18","FF19","FF20","FF21","RR01","RR02","RR03","RR04","RR05","RR06","RR07","WW01","WW02","WW03","WW04","WW05","WW06","WW07","WW08","WW09"];

const TIPO_LABELS={pantalon:"Pantalón",camisa:"Camisa",calzado:"Calzado",bolso:"Bolso de mano",accesorio:"Accesorio"};

// Estado global
let globalHist=[], globalPrendas=[], editingId=null;

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── NAVEGACIÓN ──
document.querySelector('.main-tabs').addEventListener('click',e=>{
  const btn=e.target.closest('.main-tab');if(!btn)return;
  document.querySelectorAll('.main-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.main-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('main-'+btn.dataset.main).classList.add('active');
});

document.querySelector('.sub-tabs').addEventListener('click',e=>{
  const btn=e.target.closest('.sub-tab');if(!btn)return;
  document.querySelectorAll('.sub-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.sub-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('sub-'+btn.dataset.sub).classList.add('active');
});

// ── CLOSET ──
function renderCloset(prendas, hist){
  const tipoMap={pantalon:[],camisa:[],calzado:[],bolso:[],accesorio:[]};
  prendas.forEach(p=>{
    if(tipoMap[p.tipo]) tipoMap[p.tipo].push(p);
  });

  // Calcular usos por outfit_id del historial
  const usoCnt={};
  hist.forEach(h=>{usoCnt[h.id]=(usoCnt[h.id]||0)+1;});

  Object.entries(tipoMap).forEach(([tipo,items])=>{
    const container=document.getElementById('list-'+tipo);
    if(!container) return;

    // Agrupar por subtipo
    const bySubtipo={};
    items.forEach(p=>{
      const sub=p.subtipo||'sin clasificar';
      if(!bySubtipo[sub]) bySubtipo[sub]=[];
      bySubtipo[sub].push(p);
    });

    let html='';
    Object.entries(bySubtipo).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([sub,ps])=>{
      html+=`<div class="subtipo-lbl">${sub}</div>`;
      ps.forEach(p=>{
        // Calcular usos totales sumando los outfits asociados
        const outfitIds=(p.outfit_id||'').split(',').map(s=>s.trim()).filter(Boolean);
        const usosTotales=outfitIds.reduce((acc,id)=>acc+(usoCnt[id]||0),0);
        const color=p.color||'#888888';
        const isLight=color==='#f5f4f0'||color==='#ffffff'||color.toLowerCase()==='#fff'||color.toLowerCase()==='#f0f0e8';
        html+=`<div class="prenda-card">
          <div class="prenda-color" style="background:${color};${isLight?'border-color:var(--border2);':''}"></div>
          <div class="prenda-info">
            <div class="prenda-top">
              <span class="prenda-marca">${p.marca||'—'}</span>
              <span class="prenda-usos">${usosTotales>0?'· usado '+usosTotales+(usosTotales===1?' vez':' veces'):'· sin uso aún'}</span>
            </div>
            ${p.descripcion?`<div class="prenda-desc">${p.descripcion}</div>`:''}
            <div class="prenda-outfits">
              ${outfitIds.map(id=>`<span class="outfit-tag">${id}</span>`).join('')}
            </div>
          </div>
          <button onclick="openEditForm('${p.id}')" style="background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;flex-shrink:0;"><i class="ti ti-pencil" style="font-size:14px;"></i></button>
        </div>`;
      });
    });

    html+=`<button class="add-btn" onclick="openForm('${tipo}')"><i class="ti ti-plus"></i> agregar ${TIPO_LABELS[tipo]?.toLowerCase()||tipo}</button>`;
    container.innerHTML=html;
  });
}

// ── FORM ──
function openForm(tipo){
  editingId=null;
  document.getElementById('form-title').textContent='agregar prenda';
  document.getElementById('f-tipo').value=tipo||'pantalon';
  document.getElementById('f-subtipo').value='';
  document.getElementById('f-marca').value='';
  document.getElementById('f-outfits').value='';
  document.getElementById('f-color').value='';
  document.getElementById('f-desc').value='';
  document.getElementById('form-overlay').style.display='flex';
}

function openEditForm(id){
  const p=globalPrendas.find(x=>x.id===id);
  if(!p) return;
  editingId=id;
  document.getElementById('form-title').textContent='editar prenda';
  document.getElementById('f-tipo').value=p.tipo||'pantalon';
  document.getElementById('f-subtipo').value=p.subtipo||'';
  document.getElementById('f-marca').value=p.marca||'';
  document.getElementById('f-outfits').value=p.outfit_id||'';
  document.getElementById('f-color').value=p.color||'';
  document.getElementById('f-desc').value=p.descripcion||'';
  document.getElementById('form-overlay').style.display='flex';
}

function closeForm(){
  document.getElementById('form-overlay').style.display='none';
  editingId=null;
}

async function guardarPrenda(){
  const tipo=document.getElementById('f-tipo').value;
  const subtipo=document.getElementById('f-subtipo').value.trim();
  const marca=document.getElementById('f-marca').value.trim();
  const outfit_id=document.getElementById('f-outfits').value.trim();
  const color=document.getElementById('f-color').value.trim();
  const descripcion=document.getElementById('f-desc').value.trim();

  if(!marca){toast('agrega la marca');return;}

  const body={tipo,subtipo,marca,outfit_id,color,descripcion};

  try{
    let r;
    if(editingId){
      r=await fetch(`${SB_URL}/rest/v1/prendas?id=eq.${editingId}`,{
        method:'PATCH',headers:{...SB_H,'Prefer':'return=minimal'},body:JSON.stringify(body)
      });
    } else {
      r=await fetch(`${SB_URL}/rest/v1/prendas`,{
        method:'POST',headers:{...SB_H,'Prefer':'return=minimal'},body:JSON.stringify(body)
      });
    }
    if(!r.ok){const t=await r.text();console.error(t);toast('error al guardar');return;}
    toast(editingId?'prenda actualizada ✓':'prenda guardada ✓');
    closeForm();
    // Recargar prendas
    const prendas=await fetchPrendas();
    globalPrendas=prendas;
    renderCloset(prendas,globalHist);
  }catch(e){console.error(e);toast('error de conexión');}
}

// ── ESTADÍSTICAS ──
function renderStats(hist, outfits){
  const total=hist.length;
  const unicos=new Set(hist.map(h=>h.id)).size;
  const dias=new Set(hist.map(h=>h.fecha)).size;

  // Rachas
  const fechas=[...new Set(hist.map(h=>h.fecha))].sort();
  let maxR=1,curR=1,curRacha=1;
  for(let i=1;i<fechas.length;i++){
    if((new Date(fechas[i])-new Date(fechas[i-1]))/86400000===1){curR++;curRacha++;if(curR>maxR)maxR=curR;}
    else{curRacha=1;}
  }
  // racha actual: contando hacia atrás desde hoy
  const hoyDate=new Date();hoyDate.setHours(0,0,0,0);
  let rachaActual=0;
  for(let i=0;i<30;i++){
    const d=new Date(hoyDate);d.setDate(d.getDate()-i);
    const f=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if(fechas.includes(f)) rachaActual++;
    else break;
  }

  document.getElementById('kpis-stats').innerHTML=`
    <div class="kpi"><div class="kpi-val">${total}</div><div class="kpi-lbl">registros totales</div></div>
    <div class="kpi"><div class="kpi-val">${rachaActual}</div><div class="kpi-lbl">racha actual 🔥</div></div>
    <div class="kpi"><div class="kpi-val">${maxR}</div><div class="kpi-lbl">récord de racha 🏆</div></div>`;

  document.getElementById('rachas-section').innerHTML=`
    <div class="racha-card">
      <div class="racha-num" style="color:#E07B2A;">${rachaActual}</div>
      <div><div class="racha-lbl">racha actual 🔥</div><div class="racha-sub">${rachaActual===1?'1 día seguido':rachaActual+' días seguidos'}</div></div>
    </div>
    <div class="racha-card">
      <div class="racha-num" style="color:#8B6914;">${maxR}</div>
      <div><div class="racha-lbl">récord histórico 🏆</div><div class="racha-sub">mejor racha registrada</div></div>
    </div>`;

  // Top outfits
  const usoCnt={};
  hist.forEach(h=>{usoCnt[h.id]=(usoCnt[h.id]||0)+1;});
  const topOutfits=Object.entries(usoCnt).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxUso=topOutfits[0]?.[1]||1;
  document.getElementById('top-outfits').innerHTML=topOutfits.map(([id,n],i)=>{
    const enf=hist.find(h=>h.id===id)?.e||'';
    const color=ENFOQUES_C[enf]||'#888';
    return`<div class="row">
      <span class="rk">${i+1}</span>
      <span class="os-id">${id}</span>
      <span class="os-dot" style="background:${color};"></span>
      <span class="os-name">${enf}</span>
      <div class="bw"><div class="bf" style="width:${Math.round(n/maxUso*100)}%;background:${color};"></div></div>
      <span class="os-n">${n}x</span>
    </div>`;
  }).join('');

  // Nunca usados
  const nuncaUsados=OUTFITS_INV.filter(id=>!usoCnt[id]);
  document.getElementById('nunca-usados').innerHTML=nuncaUsados.length===0
    ?'<div style="padding:10px;font-size:13px;color:var(--text3);">todos los outfits han sido usados</div>'
    :nuncaUsados.map(id=>{
      const disponible=outfits.find(o=>o.id===id&&!o.usado);
      return`<div class="row">
        <span class="os-id">${id}</span>
        <span class="os-name">${id.substring(0,2)==='EE'?'Elegantes':id.substring(0,2)==='FF'?'Formales':id.substring(0,2)==='RR'?'Relaxed':'Weekend'}</span>
        <span style="font-size:11px;color:var(--text3);">${disponible?'disponible':'usado'}</span>
      </div>`;
    }).join('');

  // Día de la semana
  const dowCnt=[0,0,0,0,0,0,0];
  hist.forEach(h=>{const d=new Date(h.fecha+'T12:00:00').getDay();dowCnt[d]++;});
  const dowLabels=['d','l','m','m','j','v','s'];
  const dowColors=['#BA7517','#378ADD','#378ADD','#378ADD','#378ADD','#1D9E75','#BA7517'];
  const maxDow=Math.max(...dowCnt,1);
  document.getElementById('dow-grid').innerHTML=dowLabels.map((l,i)=>`
    <div class="dow-col">
      <div class="dow-lbl">${l}</div>
      <div class="dow-bw"><div class="dow-bf" style="height:${Math.round(dowCnt[i]/maxDow*100)}%;background:${dowColors[i]};"></div></div>
      <div class="dow-n">${dowCnt[i]}</div>
    </div>`).join('');

  // Enfoques de esta semana
  const hoyStr=new Date().toISOString().slice(0,10);
  const hoyD=new Date();hoyD.setHours(0,0,0,0);
  const dow=hoyD.getDay();
  const offsetLunes=dow===0?-6:1-dow;
  const lunes=new Date(hoyD);lunes.setDate(hoyD.getDate()+offsetLunes);
  const byFecha={};hist.forEach(h=>{byFecha[h.fecha]=h;});
  const dowNombres=['lun','mar','mié','jue','vie','sáb','dom'];
  let semanaHTML='';
  for(let i=0;i<7;i++){
    const d=new Date(lunes);d.setDate(lunes.getDate()+i);
    const f=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const entrada=byFecha[f];
    const esFuturo=f>hoyStr;
    if(esFuturo) break;
    semanaHTML+=`<div class="row" style="${!entrada?'opacity:0.5;':''}">
      <span class="os-dot" style="background:${entrada?ENFOQUES_C[entrada.e]||'#888':'var(--bg3)'}"></span>
      <span class="os-name">${entrada?entrada.e:'sin registro'}</span>
      <span style="font-size:11px;color:var(--text3);">${dowNombres[i]}</span>
    </div>`;
  }
  document.getElementById('semana-enfoques').innerHTML=semanaHTML||'<div style="padding:10px;font-size:13px;color:var(--text3);">sin datos esta semana</div>';
}

// ── HEATMAP ──
function buildHeatmap(hist){
  const byDate={};
  hist.forEach(h=>{if(!byDate[h.fecha])byDate[h.fecha]=[];byDate[h.fecha].push(h.e);});
  const mesesSet=[...new Set(hist.map(h=>h.fecha.substring(0,7)))].sort();
  const mN=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const enfsUsados=new Set(hist.map(h=>h.e));
  let html='';
  mesesSet.forEach(mes=>{
    const[y,m]=mes.split('-').map(Number);
    const diasMes=new Date(y,m,0).getDate();
    const primer=new Date(y,m-1,1).getDay();
    html+=`<div class="hm-mes"><div class="hm-mes-lbl">${mN[m-1]} ${y}</div><div class="hm-grid">`;
    for(let i=0;i<primer;i++) html+=`<div class="hm-empty"></div>`;
    for(let d=1;d<=diasMes;d++){
      const fecha=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const enfs=byDate[fecha]||[];
      if(enfs.length===0){
        html+=`<div class="hm-cell" style="background:var(--bg3);"></div>`;
      } else if(enfs.length===1){
        const c=ENFOQUES_C[enfs[0]]||'#888';
        html+=`<div class="hm-cell" title="${enfs[0]}" style="background:${c};"></div>`;
      } else {
        const c1=ENFOQUES_C[enfs[0]]||'#888';
        const c2=ENFOQUES_C[enfs[1]]||'#888';
        html+=`<div class="hm-cell" title="${enfs[0]} + ${enfs[1]}">
          <svg viewBox="0 0 10 10" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;display:block;">
            <polygon points="0,0 10,0 0,10" fill="${c1}"/>
            <polygon points="10,0 10,10 0,10" fill="${c2}"/>
          </svg>
        </div>`;
      }
    }
    html+=`</div></div>`;
  });
  document.getElementById('heatmap-wrap').innerHTML=html;
  document.getElementById('hm-legend').innerHTML=[...enfsUsados].map(e=>
    `<span class="hm-leg"><span class="hm-leg-sq" style="background:${ENFOQUES_C[e]||'#888'}"></span>${e}</span>`).join('');
}

// ── FETCH ──
async function fetchPrendas(){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/prendas?select=*&order=tipo.asc,subtipo.asc`,{headers:SB_H});
    if(!r.ok) return [];
    return await r.json();
  }catch(e){return [];}
}

async function init(){
  try{
    const [rHist,rOutfits,rPrendas]=await Promise.all([
      fetch(`${SB_URL}/rest/v1/historial?order=fecha.asc,id.asc&select=fecha,outfit_id,enfoque`,{headers:SB_H}),
      fetch(`${SB_URL}/rest/v1/outfits?select=id,usado`,{headers:SB_H}),
      fetch(`${SB_URL}/rest/v1/prendas?select=*&order=tipo.asc,subtipo.asc`,{headers:SB_H}),
    ]);

    const histRows=await rHist.json();
    const outfits=await rOutfits.json();
    const prendas=await rPrendas.json();

    const hist=histRows.map(r=>({fecha:r.fecha,id:r.outfit_id,e:r.enfoque}));

    globalHist=hist;
    globalPrendas=prendas;

    document.getElementById('loading').style.display='none';
    document.getElementById('content').style.display='';

    renderCloset(prendas,hist);
    renderStats(hist,outfits);
    buildHeatmap(hist);
  }catch(e){
    console.error(e);
    document.getElementById('loading').innerHTML='<i class="ti ti-wifi-off"></i>error cargando datos';
  }
}

// Cerrar form al tocar fuera
document.getElementById('form-overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('form-overlay')) closeForm();
});

init();
</script>
