<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@300;400&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f5f4f0;--bg2:#eceae4;--bg3:#e2e0d8;--surface:#fff;
  --text:#1a1916;--text2:#6b6960;--text3:#a8a69e;
  --border:rgba(26,25,22,0.1);--border2:rgba(26,25,22,0.18);
  --r:16px;--r-sm:10px;--r-pill:99px;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#141412;--bg2:#1e1d1a;--bg3:#262521;--surface:#1e1d1a;
  --text:#f0ede6;--text2:#8a8880;--text3:#555350;
  --border:rgba(240,237,230,0.08);--border2:rgba(240,237,230,0.15);
}}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:16px;line-height:1.5;}
.app{max-width:480px;margin:0 auto;padding-bottom:40px;}
.status-bar{height:calc(var(--safe-top)+6px);}
.header{padding:2px 20px 16px;display:flex;align-items:center;justify-content:space-between;}
.header-title{font-size:12px;color:var(--text3);letter-spacing:0.14em;text-transform:uppercase;}
.back-btn{width:36px;height:36px;border-radius:var(--r-sm);border:1px solid var(--border2);background:var(--surface);color:var(--text);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;text-decoration:none;}
.back-btn:active{background:var(--bg3);}
.page{padding:0 20px 24px;}
.hero{padding:6px 0 20px;}
.hero-title{font-size:38px;font-weight:300;letter-spacing:-0.02em;line-height:1;}
.hero-sub{font-size:13px;color:var(--text2);margin-top:6px;}
.section-label{font-size:11px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin:20px 0 10px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;}
.card-title{font-size:11px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:14px;}
.stat-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.stat-row:last-child{border-bottom:none;}
.stat-rank{font-size:11px;color:var(--text3);font-family:var(--mono);min-width:18px;}
.stat-bar-wrap{flex:1;height:4px;background:var(--bg3);border-radius:99px;overflow:hidden;}
.stat-bar{height:100%;border-radius:99px;transition:width 0.6s cubic-bezier(0.4,0,0.2,1);}
.stat-name{font-size:13px;min-width:90px;}
.stat-count{font-size:13px;font-family:var(--mono);color:var(--text2);min-width:28px;text-align:right;}
.stat-pct{font-size:10px;color:var(--text3);font-family:var(--mono);min-width:34px;text-align:right;}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;}
.kpi-val{font-size:36px;font-weight:300;letter-spacing:-0.02em;line-height:1;}
.kpi-lbl{font-size:11px;color:var(--text3);margin-top:4px;}
.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;position:relative;}
.chart-canvas{max-height:220px;}
.loading{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px;}
.loading i{font-size:24px;display:block;margin-bottom:8px;opacity:0.5;}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:var(--r-pill);background:var(--bg2);color:var(--text3);margin-left:6px;font-family:var(--mono);}
.tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;margin-bottom:16px;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:7px 13px;border-radius:var(--r-pill);border:1px solid var(--border2);background:none;color:var(--text2);font-family:var(--font);font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.tab.active{background:var(--text);color:var(--bg);border-color:var(--text);}
.month-chip{display:inline-flex;align-items:center;gap:5px;background:var(--bg2);border-radius:var(--r-sm);padding:6px 10px;font-size:12px;color:var(--text2);margin:3px;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.combo-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;}
.combo-row:last-child{border-bottom:none;}
.combo-cnt{font-size:18px;font-weight:300;font-family:var(--mono);min-width:32px;text-align:right;}
</style>
</head>

};

function getColor(marca,alpha=1){
  const hex=MARCA_COLORS[marca]||'#888888';
  if(alpha===1) return hex;
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── FETCH SUPABASE ──
async function fetchState(){
  const r=await fetch(`${SB_URL}/rest/v1/outfits_state?key=eq.state&select=value`,{headers:SB_H});
  if(!r.ok) throw new Error('Supabase error');
  const d=await r.json();
  if(!d.length) throw new Error('Sin datos');
  return JSON.parse(d[0].value);
}

// ── CONTEOS ──
function contarPorCampo(historial,campo){
  const cnt={};
  historial.forEach(h=>{
    const m=MARCAS[h.id];
    if(!m) return;
    const v=m[campo];
    if(v) cnt[v]=(cnt[v]||0)+1;
  });
  return Object.entries(cnt).sort((a,b)=>b[1]-a[1]);
}

function contarTotal(historial){
  const cnt={};
  historial.forEach(h=>{
    const m=MARCAS[h.id];
    if(!m) return;
    ['camisa','pantalon','calzado','bolso','termo'].forEach(c=>{
      const v=m[c];if(v) cnt[v]=(cnt[v]||0)+1;
    });
  });
  return Object.entries(cnt).sort((a,b)=>b[1]-a[1]);
}

function contarEnfoques(historial){
  const cnt={};
  historial.forEach(h=>{if(h.e) cnt[h.e]=(cnt[h.e]||0)+1;});
  return Object.entries(cnt).sort((a,b)=>b[1]-a[1]);
}

function contarCats(historial){
  const cnt={EE:0,FF:0,RR:0,WW:0};
  historial.forEach(h=>{const c=h.id?.substring(0,2);if(cnt[c]!==undefined) cnt[c]++;});
  return Object.entries(cnt).sort((a,b)=>b[1]-a[1]);
}

function contarPorMes(historial){
  const meses={};
  historial.forEach(h=>{
    const m=h.fecha?.substring(0,7);
    if(!m) return;
    if(!meses[m]) meses[m]={};
    const marcas=MARCAS[h.id];
    if(marcas){
      ['camisa','pantalon'].forEach(c=>{
        const v=marcas[c];if(v) meses[m][v]=(meses[m][v]||0)+1;
      });
    }
  });
  return meses;
}

function topN(arr,n=8){return arr.slice(0,n);}

// ── CHART.JS HELPERS ──
const chartInstances={};
function makeChart(id,config){
  if(chartInstances[id]) chartInstances[id].destroy();
  const ctx=document.getElementById(id);
  if(!ctx) return;
  chartInstances[id]=new Chart(ctx,config);
}

function isDark(){return window.matchMedia('(prefers-color-scheme:dark)').matches;}
function textColor(){return isDark()?'#f0ede6':'#1a1916';}
function gridColor(){return isDark()?'rgba(240,237,230,0.08)':'rgba(26,25,22,0.08)';}

function barConfig(labels,data,colors,title){
  return{
    type:'bar',
    data:{labels,datasets:[{data,backgroundColor:colors,borderRadius:6,borderSkipped:false}]},
    options:{
      responsive:true,maintainAspectRatio:true,
      plugins:{legend:{display:false},title:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.parsed.y} veces`}}},
      scales:{
        x:{ticks:{color:textColor(),font:{family:'DM Mono',size:10}},grid:{display:false}},
        y:{ticks:{color:textColor(),font:{family:'DM Mono',size:10},stepSize:1},grid:{color:gridColor()},beginAtZero:true}
      }
    }
  };
}

function doughnutConfig(labels,data,colors){
  return{
    type:'doughnut',
    data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:0,hoverOffset:4}]},
    options:{
      responsive:true,maintainAspectRatio:true,cutout:'65%',
      plugins:{
        legend:{position:'right',labels:{color:textColor(),font:{family:'DM Sans',size:11},boxWidth:10,padding:8}},
        tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${ctx.parsed} (${Math.round(ctx.parsed/ctx.dataset.data.reduce((a,b)=>a+b,0)*100)}%)`}}
      }
    }
  };
}

function lineConfig(labels,datasets){
  return{
    type:'line',
    data:{labels,datasets},
    options:{
      responsive:true,maintainAspectRatio:true,
      plugins:{legend:{labels:{color:textColor(),font:{family:'DM Sans',size:11},boxWidth:10}}},
      scales:{
        x:{ticks:{color:textColor(),font:{family:'DM Mono',size:10}},grid:{color:gridColor()}},
        y:{ticks:{color:textColor(),font:{family:'DM Mono',size:10},stepSize:1},grid:{color:gridColor()},beginAtZero:true}
      }
    }
  };
}

// ── RENDER LISTA CON BARRA ──
function listaBarras(datos,total,colorFn,limit=10){
  const top=datos.slice(0,limit);
  const max=top[0]?.[1]||1;
  return top.map(([nombre,cnt],i)=>`
    <div class="stat-row">
      <span class="stat-rank">${i+1}</span>
      <span class="stat-name">${nombre}</span>
      <div class="stat-bar-wrap"><div class="stat-bar" style="width:${Math.round(cnt/max*100)}%;background:${colorFn(nombre)}"></div></div>
      <span class="stat-count">${cnt}</span>
      <span class="stat-pct">${Math.round(cnt/total*100)}%</span>
    </div>`).join('');
}

// ── RENDER PRINCIPAL ──

  const hist=state.historial||[];
  const total=hist.length;
  if(!total){
    document.getElementById('content').innerHTML='<div class="loading"><i class="ti ti-inbox"></i>sin historial</div>';
    return;
  }

  const camisas=contarPorCampo(hist,'camisa');
  const pantalones=contarPorCampo(hist,'pantalon');
  const calzados=contarPorCampo(hist,'calzado');
  const bolsos=contarPorCampo(hist,'bolso');
  const termos=contarPorCampo(hist,'termo');
  const totalMarcas=contarTotal(hist);
  const enfoques=contarEnfoques(hist);
  const cats=contarCats(hist);

  // KPIs
  const marcasUnicas=new Set(Object.values(MARCAS).flatMap(m=>Object.values(m))).size;
  const marcasUsadas=new Set(hist.flatMap(h=>MARCAS[h.id]?Object.values(MARCAS[h.id]):[]).filter(Boolean)).size;
  const outfitsUnicos=new Set(hist.map(h=>h.id)).size;
  const diasConOutfit=new Set(hist.map(h=>h.fecha)).size;

  // Meses para line chart
  const mesesData=contarPorMes(hist);
  const mesesOrdenados=Object.keys(mesesData).sort();
  const mNames={1:'ene',2:'feb',3:'mar',4:'abr',5:'may',6:'jun',7:'jul',8:'ago',9:'sep',10:'oct',11:'nov',12:'dic'};
  const mLabels=mesesOrdenados.map(m=>`${mNames[parseInt(m.split('-')[1])]} ${m.split('-')[0].slice(2)}`);

  // Top 5 marcas ropa (camisa+pantalon) para line
  const ropaMarcas={};
  hist.forEach(h=>{
    const m=MARCAS[h.id];if(!m)return;
    ['camisa','pantalon'].forEach(c=>{const v=m[c];if(v) ropaMarcas[v]=(ropaMarcas[v]||0)+1;});
  });
  const topRopa=Object.entries(ropaMarcas).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([m])=>m);

  const lineDatasets=topRopa.map(marca=>({
    label:marca,
    data:mesesOrdenados.map(mes=>{
      const d=mesesData[mes]||{};return d[marca]||0;
    }),
    borderColor:getColor(marca),backgroundColor:getColor(marca,0.15),
    tension:0.3,fill:false,pointRadius:3,borderWidth:2,
  }));

  document.getElementById('content').innerHTML=`
    <div class="hero">
      <div class="hero-title">analytics</div>
      <div class="hero-sub">${total} outfits registrados · ${diasConOutfit} días</div>
    </div>

    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-val">${total}</div><div class="kpi-lbl">outfits totales</div></div>
      <div class="kpi"><div class="kpi-val">${outfitsUnicos}</div><div class="kpi-lbl">outfits únicos</div></div>
      <div class="kpi"><div class="kpi-val">${marcasUsadas}</div><div class="kpi-lbl">marcas usadas</div></div>
      <div class="kpi"><div class="kpi-val">${marcasUnicas}</div><div class="kpi-lbl">marcas en closet</div></div>
    </div>

    <div class="section-label">ranking general de marcas</div>
    <div class="chart-wrap">
      <div class="card-title">todas las prendas combinadas</div>
      <canvas id="chart-total" class="chart-canvas"></canvas>
    </div>
    <div class="card" style="padding:4px 14px;">
      ${listaBarras(totalMarcas,totalMarcas.reduce((a,b)=>a+b[1],0),m=>getColor(m))}
    </div>

    <div class="section-label">camisas</div>
    <div class="chart-wrap">
      <canvas id="chart-camisas" class="chart-canvas"></canvas>
    </div>
    <div class="card" style="padding:4px 14px;">
      ${listaBarras(camisas,camisas.reduce((a,b)=>a+b[1],0),m=>getColor(m))}
    </div>

    <div class="section-label">pantalones</div>
    <div class="chart-wrap">
      <canvas id="chart-pantalones" class="chart-canvas"></canvas>
    </div>
    <div class="card" style="padding:4px 14px;">
      ${listaBarras(pantalones,pantalones.reduce((a,b)=>a+b[1],0),m=>getColor(m))}
    </div>

    <div class="section-label">calzado</div>
    <div class="chart-wrap">
      <canvas id="chart-calzado" class="chart-canvas"></canvas>
    </div>

    <div class="section-label">bolsos</div>
    <div class="chart-wrap">
      <canvas id="chart-bolsos" class="chart-canvas"></canvas>
    </div>

    <div class="section-label">termos</div>
    <div class="chart-wrap">
      <canvas id="chart-termos" class="chart-canvas"></canvas>
    </div>

    <div class="section-label">enfoques de color</div>
    <div class="chart-wrap">
      <canvas id="chart-enfoques" class="chart-canvas"></canvas>
    </div>

    <div class="section-label">categorías</div>
    <div class="chart-wrap">
      <canvas id="chart-cats" class="chart-canvas"></canvas>
    </div>

    <div class="section-label">evolución de marcas de ropa por mes</div>
    <div class="chart-wrap">
      <div class="card-title">top 5 marcas · camisas + pantalones</div>
      <canvas id="chart-line" class="chart-canvas" style="max-height:260px;"></canvas>
    </div>

    <div style="padding-top:10px;text-align:center;font-size:12px;color:var(--text3);">déjà vu · jose saade</div>
  `;

  // Dibujar charts
  requestAnimationFrame(()=>{
    // Total marcas (top 10 bar)
    const top10=topN(totalMarcas,10);
    makeChart('chart-total',barConfig(
      top10.map(([m])=>m),top10.map(([,n])=>n),
      top10.map(([m])=>getColor(m))
    ));

    // Camisas doughnut
    const topCam=topN(camisas,8);
    makeChart('chart-camisas',doughnutConfig(
      topCam.map(([m])=>m),topCam.map(([,n])=>n),
      topCam.map(([m])=>getColor(m))
    ));

    // Pantalones doughnut
    const topPan=topN(pantalones,8);
    makeChart('chart-pantalones',doughnutConfig(
      topPan.map(([m])=>m),topPan.map(([,n])=>n),
      topPan.map(([m])=>getColor(m))
    ));

    // Calzado bar
    makeChart('chart-calzado',barConfig(
      calzados.map(([m])=>m),calzados.map(([,n])=>n),
      calzados.map(([m])=>getColor(m))
    ));

    // Bolsos bar
    makeChart('chart-bolsos',barConfig(
      bolsos.map(([m])=>m),bolsos.map(([,n])=>n),
      bolsos.map(([m])=>getColor(m))
    ));

    // Termos bar
    makeChart('chart-termos',barConfig(
      termos.map(([m])=>m),termos.map(([,n])=>n),
      termos.map(([m])=>getColor(m))
    ));

    // Enfoques doughnut
    makeChart('chart-enfoques',doughnutConfig(
      enfoques.map(([e])=>e),enfoques.map(([,n])=>n),
      enfoques.map(([e])=>ENFOQUES[e]||'#888')
    ));

    // Categorías doughnut
    makeChart('chart-cats',doughnutConfig(
      cats.map(([k])=>CATS[k]?.nombre||k),
      cats.map(([,n])=>n),
      cats.map(([k])=>CATS[k]?.color||'#888')
    ));

    // Line chart evolución
    if(mesesOrdenados.length>1){
      makeChart('chart-line',lineConfig(mLabels,lineDatasets));
    }
  });
}

// ── INIT ──
async function init(){
  try{
    const state=await fetchState();
    document.getElementById('loading').style.display='none';
    document.getElementById('content').style.display='';
    render(state);
  }catch(e){
    document.getElementById('loading').innerHTML=`<i class="ti ti-wifi-off"></i>error cargando datos`;
  }
}

init();
</script>
</body>
</html>
